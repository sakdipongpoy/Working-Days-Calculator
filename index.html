<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Working Days Calculator (Thailand)</title>

<style>
body {
    font-family: Arial;
    background: #f2f4f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    width: 320px;
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    background: #007bff;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

.result {
    margin-top: 15px;
    font-size: 18px;
}

.legend {
    margin-top: 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Working Days (Thailand)</h2>

    <input type="date" id="startDate">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>

    <div class="legend">
        Working days = Mon–Fri (excluding holidays)
    </div>
</div>

<script>

// 🇹🇭 Thailand Holidays 2026 (updated)
const holidays = new Set([
"2026-01-01","2026-02-02","2026-04-06",
"2026-04-13","2026-04-14","2026-04-15",
"2026-05-01","2026-05-04","2026-06-03",
"2026-07-01","2026-07-02","2026-07-28",
"2026-08-12","2026-10-13","2026-10-23",
"2026-12-05","2026-12-10",

// 🔥 Year-end holidays (your requirement)
"2026-12-28","2026-12-29","2026-12-30","2026-12-31"
]);

function isHoliday(date) {
    return holidays.has(date.toISOString().split("T")[0]);
}

function calculate() {
    const input = document.getElementById("startDate").value;

    if (!input) {
        alert("Please select a date");
        return;
    }

    let startDate = new Date(input + "T00:00:00");

    // 🔥 EXCLUDE selected date (start from next day)
    startDate.setDate(startDate.getDate() + 1);

    const endDate = new Date(startDate.getFullYear(), 11, 31);

    let workingDays = 0;
    let holidayCount = 0;
    let weekendCount = 0;

    for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {

        const day = d.getDay(); // 0=Sun, 6=Sat
        const holiday = isHoliday(d);

        if (holiday) {
            holidayCount++;
            continue;
        }

        if (day === 0 || day === 6) {
            weekendCount++;
            continue;
        }

        workingDays++;
    }

    document.getElementById("result").innerHTML = `
        Working Days: <b>${workingDays}</b><br>
        Holidays: ${holidayCount}<br>
        Weekends: ${weekendCount}
    `;
}

</script>

</body>
</html>
